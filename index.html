<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1a6b4a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MediStock — Medical Shop Inventory</title>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<link rel="manifest" href="/manifest.json">

<!-- Register Service Worker -->
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>

<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#e2e8f0;
  --accent:#1a6b4a;--accent-light:#dcfce7;--accent-dark:#155a3c;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --danger:#ef4444;--danger-light:#fee2e2;
  --warning:#f59e0b;--warning-light:#fef3c7;
  --info:#3b82f6;--info-light:#dbeafe;
  --orange:#ea580c;--orange-light:#ffedd5;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --sw:260px;--r:14px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shm:0 20px 50px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#root{display:flex;min-height:100vh;}

/* ===== MOBILE FIRST BASE ===== */
.login-wrap{min-height:100dvh;width:100%;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#0a1f14 0%,#1a6b4a 50%,#0f2d1f 100%);}
.login-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:420px;box-shadow:var(--shm);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#22c55e);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-icon{width:56px;height:56px;background:var(--accent-light);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;}
.login-logo h1{font-size:24px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;}
.login-logo p{font-size:13px;color:var(--text3);margin-top:4px;}
.lfg{margin-bottom:16px;}
.lfg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.03em;}
.lfg input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;background:var(--surface2);}
.lfg input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(26,107,74,.1);background:#fff;}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:6px;transition:all .2s;position:relative;overflow:hidden;}
.login-btn:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,74,.3);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.login-err{background:var(--danger-light);color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6;padding:0 8px;}
.login-hint b{color:var(--text2);}
.cplink{font-size:13px;color:var(--accent);cursor:pointer;text-decoration:underline;text-align:center;display:block;margin-top:12px;font-weight:500;padding:8px;}
.user-select{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.user-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;flex:1;min-width:80px;text-align:center;}
.user-chip:hover{border-color:var(--accent);color:var(--accent);}
.user-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ===== SIDEBAR (Desktop) ===== */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;top:0;left:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:18px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
.nav-item .sync-badge{position:absolute;right:10px;width:8px;height:8px;background:var(--warning);border-radius:50%;display:none;}
.nav-item .sync-badge.show{display:block;animation:pulse 2s infinite;}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface2);}
.sidebar-footer p{font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.5;}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:#fff;border-radius:8px;border:1px solid var(--border);}
.user-info .avatar{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.user-info span{font-size:12px;font-weight:600;color:var(--text);}
.logout-btn{width:100%;padding:9px;background:var(--danger-light);color:var(--danger);border:1px solid #fca5a5;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;justify-content:center;transition:all .15s;}
.logout-btn:hover{background:#fecaca;}

/* ===== MOBILE HEADER ===== */
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);z-index:99;padding:0 16px;align-items:center;justify-content:space-between;}
.mobile-header h1{font-size:16px;font-weight:700;color:var(--accent);}
.mobile-menu-btn{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:20px;}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;backdrop-filter:blur(4px);}

/* ===== MAIN CONTENT ===== */
.main{margin-left:var(--sw);flex:1;padding:28px 32px;max-width:1200px;transition:margin .3s;}
.page-header{margin-bottom:24px;}
.page-header h2{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.2;}
.page-header p{font-size:14px;color:var(--text2);margin-top:4px;}

/* ===== STATS ===== */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.stat-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);opacity:.3;}
.stat-label{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:6px;line-height:1.2;}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500;}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--text);}

/* ===== TABLES ===== */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
tr.sync-pending td{background:var(--warning-light);opacity:.9;}
tr.sync-pending td:first-child{position:relative;}
tr.sync-pending td:first-child::before{content:'⏳';position:absolute;left:4px;font-size:10px;}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg{background:var(--accent-light);color:var(--accent);}
.br{background:var(--danger-light);color:var(--danger);}
.by{background:var(--warning-light);color:#b45309;}
.bb{background:var(--info-light);color:var(--info);}
.bo{background:var(--orange-light);color:var(--orange);}
.bp{background:var(--purple-light);color:var(--purple);}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,107,74,.25);}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--bg);border-color:var(--text3);}
.btn-orange{background:var(--orange-light);color:var(--orange);border:1.5px solid #fed7aa;}
.btn-orange:hover{background:#fed7aa;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.bti{padding:6px 10px;border-radius:8px;background:none;border:1.5px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;}
.bti svg{width:13px;height:13px;flex-shrink:0;}
.bti:hover{background:var(--bg);}
.bti.del{border-color:#fca5a5;color:var(--danger);background:var(--danger-light);}
.bti.del:hover{background:#fecaca;}
.bti.wo{border-color:#fed7aa;color:var(--orange);background:var(--orange-light);}
.bti.wo:hover{background:#fed7aa;}

/* ===== MODALS ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);animation:fadeIn .2s;}
.modal{background:var(--surface);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shm);animation:slideUp .3s;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.mform{display:flex;flex-direction:column;gap:14px;}
.fg{display:flex;flex-direction:column;gap:6px;}
.fg label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;}
.fg input,.fg select,.fg textarea{padding:10px 13px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);transition:all .2s;outline:none;width:100%;}
.fg textarea{resize:vertical;min-height:80px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(26,107,74,.08);background:#fff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ===== TOOLBAR ===== */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.sbox{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:8px 13px;flex:1;min-width:200px;transition:all .2s;}
.sbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(26,107,74,.08);}
.sbox input{border:none;outline:none;font-size:14px;background:transparent;color:var(--text);width:100%;}
.sbox svg{color:var(--text3);width:16px;height:16px;flex-shrink:0;}
select.flt{padding:8px 13px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;height:40px;cursor:pointer;transition:all .2s;}
select.flt:focus{border-color:var(--accent);}

/* ===== ALERTS & PILLS ===== */
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:500;}
.alert svg{width:16px;height:16px;flex-shrink:0;}
.aw{background:var(--warning-light);color:#92400e;border:1px solid #fde68a;}
.ad{background:var(--danger-light);color:#991b1b;border:1px solid #fca5a5;}
.ao{background:var(--orange-light);color:#9a3412;border:1px solid #fed7aa;}
.infopill{display:flex;align-items:center;gap:8px;background:var(--accent-light);color:var(--accent);border-radius:10px;padding:10px 14px;font-size:13px;border:1px solid #bbf7d0;font-weight:500;}
.warnpill{display:flex;align-items:center;gap:8px;background:var(--orange-light);color:var(--orange);border-radius:10px;padding:10px 14px;font-size:13px;border:1px solid #fed7aa;font-weight:500;}
.calcpill{background:var(--info-light);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--info);border:1px solid #bfdbfe;font-weight:600;}
.notecell{font-size:12px;color:var(--text2);font-style:italic;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ===== SYNC STATUS BAR ===== */
.sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.sync-bar.active{transform:scaleX(1);animation:syncPulse 1.5s infinite;}
.sync-toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:999;display:flex;align-items:center;gap:8px;transform:translateY(100px);opacity:0;transition:all .3s;}
.sync-toast.show{transform:translateY(0);opacity:1;}
.offline-banner{position:fixed;top:0;left:0;right:0;background:var(--warning);color:#fff;padding:8px 16px;text-align:center;font-size:13px;font-weight:600;z-index:999;display:none;align-items:center;justify-content:center;gap:8px;}
.offline-banner.show{display:flex;}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes syncPulse{0%,100%{opacity:.6;}50%{opacity:1;}}

/* ===== MISC ===== */
.pp{color:#16a34a;font-weight:700;font-family:'DM Mono',monospace;}
.pn{color:var(--danger);font-weight:700;font-family:'DM Mono',monospace;}
.mono{font-family:'DM Mono',monospace;}
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty p{font-size:14px;margin-top:8px;}
.empty .icon{font-size:40px;margin-bottom:8px;opacity:.5;}

/* ===== RESPONSIVE DESIGN ===== */
@media(max-width:1024px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:768px){
  :root{--sw:0px;}
  .sidebar{transform:translateX(-100%);width:280px;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:80px 16px 24px;max-width:100%;}
  .mobile-header{display:flex;}
  .mobile-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .3s;}
  .mobile-overlay.show{opacity:1;pointer-events:auto;}
  
  .stat-grid{grid-template-columns:1fr;gap:12px;}
  .stat-card{padding:16px;}
  .stat-value{font-size:22px;}
  
  .toolbar{flex-direction:column;align-items:stretch;}
  .sbox{width:100%;}
  
  .g2,.g3{grid-template-columns:1fr;}
  .modal{padding:24px 20px;border-radius:16px;}
  
  table{font-size:12px;}
  th,td{padding:8px 10px;}
  
  .bti{padding:8px 10px;}
}

@media(max-width:480px){
  .login-card{padding:28px 20px;border-radius:20px;}
  .page-header h2{font-size:20px;}
  .card{padding:16px;}
  .card-title{font-size:14px;}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text2);}

/* ===== TOUCH OPTIMIZATIONS ===== */
@media(hover:none){
  .btn:hover,.bti:hover,.nav-item:hover{transform:none;}
  .stat-card:hover{transform:none;}
}
</style>
</head>
<body>
<div id="root"></div>

<div id="offline-banner" class="offline-banner">

</div>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const san  = s => String(s||'').trim().slice(0,400);
const sNum = v => { const n=parseFloat(v); return isNaN(n)||n<0?0:n; };
const uid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt  = n => '₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

const hashPwd = async pwd => {
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(san(pwd)+'ms_salt_9x'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

const getUserKey = (k, userId) => `ms_${userId}_${k}`;
const load = (k, userId, d=[]) => { 
  try{const v=localStorage.getItem(getUserKey(k,userId));return v?JSON.parse(v):d;}catch{return d;} 
};
const save = (k, userId, v) => { 
  try{localStorage.setItem(getUserKey(k,userId),JSON.stringify(v));}catch{alert('Storage full!');} 
};

const SyncQueue = {
  getQueue: (userId) => load('sync_queue', userId, []),
  add: (userId, operation) => {
    const queue = SyncQueue.getQueue(userId);
    queue.push({...operation, timestamp: Date.now(), id: uid()});
    save('sync_queue', userId, queue);
  },
  remove: (userId, opId) => {
    const queue = SyncQueue.getQueue(userId).filter(q => q.id !== opId);
    save('sync_queue', userId, queue);
  },
  clear: (userId) => save('sync_queue', userId, []),
};

// ═══════════════════════════════════════════════════════════════
// SYNC ENGINE (FIXED)
// ═══════════════════════════════════════════════════════════════
const SyncEngine = {
  isOnline: () => navigator.onLine,
  
  showToast: (msg) => {
    const toast = document.getElementById('sync-toast');
    const bar = document.getElementById('sync-bar');
    if(!toast || !bar) return;
    document.getElementById('sync-msg').textContent = msg;
    toast.classList.add('show');
    bar.classList.add('active');
    setTimeout(() => {
      toast.classList.remove('show');
      bar.classList.remove('active');
    }, 3000);
  },

  updateOfflineBanner: () => {
    const banner = document.getElementById('offline-banner');
    if(!banner) return;
    if(!navigator.onLine) banner.classList.add('show');
    else banner.classList.remove('show');
  },

  syncToSupabase: async (userId, table, type, data) => {
    if(!navigator.onLine || !supabase) return false;
    
    try {
      let result;
      const payload = {...data, user_id: userId};
      
      if(type === 'insert') {
        result = await supabase.from(table).insert([payload]);
      } else if(type === 'update') {
        result = await supabase.from(table).update(payload).eq('id', data.id);
      } else if(type === 'delete') {
        result = await supabase.from(table).delete().eq('id', data.id);
      }
      
      if(result.error) {
        console.error('Supabase error:', result.error);
        return false;
      }
      
      return true;
    } catch(err) {
      console.error('Sync failed:', err);
      return false;
    }
  },

  pushLocalChange: async (userId, table, type, data) => {
    const synced = await SyncEngine.syncToSupabase(userId, table, type, data);
    
    if(!synced) {
      SyncQueue.add(userId, { table, type, data });
      SyncEngine.showToast('Saved offline. Will sync later.');
    } else {
      SyncEngine.showToast('Synced to cloud!');
    }
  },
  
  syncQueued: async (userId) => {
    const queue = SyncQueue.getQueue(userId);
    if(queue.length === 0) return;
    
    SyncEngine.showToast(`Syncing ${queue.length} items...`);
    
    for(const op of queue) {
      const success = await SyncEngine.syncToSupabase(userId, op.table, op.type, op.data);
      if(success) SyncQueue.remove(userId, op.id);
    }
    
    SyncEngine.showToast('Sync complete!');
    window.dispatchEvent(new CustomEvent('sync-complete'));
  }
};

  ]),
  
  saveUsers: (users) => save('users', 'system', users),
  
  addUser: (user) => {
    const users = UserManager.getUsers();
    if(users.find(u => u.username === user.username)) return false;
    users.push({...user, id: uid()});

    return true;
  },

    return UserManager.getUsers().find(u => u.username === username);
  }
};

// LOGIN PAGE (Multi-User)
// ═══════════════════════════════════════════════════════════════
const LoginPage = ({onLogin}) => {
  const [mode,setMode]=useState('login'); // login | change | newuser
  const [selectedUser,setSelectedUser]=useState(null);
  const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [np1,setNp1]=useState('');
  const [np2,setNp2]=useState('');
  const [newUserName,setNewUserName]=useState('');
  const [newUserUser,setNewUserUser]=useState('');
  const [newUserPwd,setNewUserPwd]=useState('');

  const users = UserManager.getUsers();

  const doLogin = async e => {
    e.preventDefault();
    if(!selectedUser||!pwd) return setErr('Select user and enter password.');
    setBusy(true); setErr('');
    const h = await hashPwd(pwd);
    const user = users.find(u => u.id === selectedUser);
    if(user && (h === user.hash || (user.hash === '' && pwd === 'password'))){ 
      const session = {id:user.id, name:user.name, username:user.username, role:user.role, ts:Date.now()};
      save('current_user', 'system', session);
      save('sess_ts', 'system', Date.now());
      initSupabase();
      onLogin(session); 
    }
    else setErr('Wrong password.');
    setBusy(false);
  };

  const doChange = async e => {
    e.preventDefault();
    if(!selectedUser) return setErr('Select a user first.');
    if(np1.length<4) return setErr('Password must be at least 4 characters.');
    if(np1!==np2) return setErr('Passwords do not match.');
    const h=await hashPwd(np1);
    const allUsers = users.map(u => u.id === selectedUser ? {...u, hash:h} : u);
    UserManager.saveUsers(allUsers);
    setMode('login'); setErr(''); setNp1(''); setNp2(''); setPwd('');
    alert('Password updated! Please login.');
  };

  const doNewUser = async e => {
    e.preventDefault();
    if(!newUserName||!newUserUser||!newUserPwd) return setErr('Fill all fields.');
    if(newUserPwd.length<4) return setErr('Password too short.');
    const h = await hashPwd(newUserPwd);
    const success = UserManager.addUser({
      name: newUserName,
      username: newUserUser,
      hash: h,
      role: 'user'
    });
    if(!success) return setErr('Username already exists.');
    setMode('login');
    setErr('');
    setNewUserName('');
    setNewUserUser('');
    setNewUserPwd('');
    alert('User created! Please login.');
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">💊</div>
          <h1>MediStock</h1>
          <p>{mode==='login'?'Medical Shop Inventory':mode==='change'?'Set New Password':'Add New User'}</p>
        </div>
        
        {err&&<div className="login-err"><Ic n="alert" s={14}/>{err}</div>}
        
        {mode==='login'&&(
          <form onSubmit={doLogin}>
            <div className="lfg">
              <label>Select User</label>
              <div className="user-select">
                {users.map(u=>(
                  <div key={u.id} className={`user-chip${selectedUser===u.id?' active':''}`} onClick={()=>setSelectedUser(u.id)}>
                    <Ic n="user" s={14}/> {u.name}
                  </div>
                ))}
              </div>
            </div>
            {selectedUser&&(
              <div className="lfg">
                <label>Password for {users.find(u=>u.id===selectedUser)?.name}</label>
                <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Enter password" autoComplete="current-password"/>
              </div>
            )}
            <button className="login-btn" type="submit" disabled={busy||!selectedUser}>
              {busy?'Checking…':'Login →'}
            </button>
            <div className="login-hint">
              Default passwords: <b>admin</b> / "password"<br/>
              Other users: use "password" if not set
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12}}>
              <span className="cplink" onClick={()=>{setMode('change');setErr('');}}>🔑 Change Password</span>
              <span className="cplink" onClick={()=>{setMode('newuser');setErr('');}}>👤 New User</span>
            </div>
          </form>
        )}
        
        {mode==='change'&&(
          <form onSubmit={doChange}>
            <div className="lfg">
              <label>Select User</label>
              <select value={selectedUser||''} onChange={e=>setSelectedUser(e.target.value)} style={{width:'100%',padding:'10px',borderRadius:'8px',border:'2px solid var(--border)'}}>
                <option value="">Select user...</option>
                {users.map(u=><option key={u.id} value={u.id}>{u.name} ({u.username})</option>)}
              </select>
            </div>
            <div className="lfg"><label>New Password (min 4 chars)</label><input type="password" value={np1} onChange={e=>setNp1(e.target.value)} placeholder="New password"/></div>
            <div className="lfg"><label>Confirm Password</label><input type="password" value={np2} onChange={e=>setNp2(e.target.value)} placeholder="Repeat password"/></div>
            <button className="login-btn" type="submit">Update Password</button>
            <span className="cplink" onClick={()=>{setMode('login');setErr('');}}>← Back to Login</span>
          </form>
        )}
        
        {mode==='newuser'&&(
          <form onSubmit={doNewUser}>
            <div className="lfg"><label>Full Name</label><input value={newUserName} onChange={e=>setNewUserName(e.target.value)} placeholder="e.g. Dr. Smith"/></div>
            <div className="lfg"><label>Username</label><input value={newUserUser} onChange={e=>setNewUserUser(e.target.value)} placeholder="e.g. smith"/></div>
            <div className="lfg"><label>Password</label><input type="password" value={newUserPwd} onChange={e=>setNewUserPwd(e.target.value)} placeholder="Min 4 characters"/></div>
            <button className="login-btn" type="submit">Create User</button>
            <span className="cplink" onClick={()=>{setMode('login');setErr('');}}>← Back to Login</span>
          </form>
        )}
      </div>
    </div>
  );
};

// DATA HOOK (User-Scoped + Sync)
// ═══════════════════════════════════════════════════════════════
const useUserData = (userId, key, defaultValue = []) => {
  const [data, setData] = useState(() => load(key, userId, defaultValue));

  const setDataAndSync = useCallback((newData) => {
    setData(newData);
    save(key, userId, newData);
  }, [userId, key]);

  // Load from cloud on mount
  useEffect(() => {
    const loadFromCloud = async () => {
      if(!navigator.onLine || !supabase) return;
      
      const tableMap = {
        'purchases': 'purchases',
        'sales': 'sales',
        'writeoffs': 'writeoffs'
      };
      const table = tableMap[key];
      if(!table) return;
      
      try {
        const { data: cloudData, error } = await supabase
          .from(table)
          .select('*')
          .eq('user_id', userId);
          
        if(error) throw error;
        
        if(cloudData && cloudData.length > 0) {
          setData(cloudData);
          save(key, userId, cloudData);
          console.log('Loaded from cloud:', cloudData.length, 'rows');
        }
      } catch(e) { 
        console.error('Cloud load failed:', e); 
      }
    };
    
    loadFromCloud();
  }, [userId, key]);

  return [data, setDataAndSync];
};

  // Load from cloud on mount
  useEffect(() => {
    const loadFromCloud = async () => {
      if(!navigator.onLine || !supabase) return;
      setSyncing(true);
      try {
        // Map local keys to Supabase table names
        const tableMap = {
          'purchases': 'purchases',
          'sales': 'sales',
          'writeoffs': 'writeoffs'
        };
        const table = tableMap[key];
        if(table) {
          const cloudData = await SyncEngine.fetchFromCloud(userId, table);
          if(cloudData && cloudData.length > 0) {
            // Merge cloud data with local (cloud wins for now)
            setData(cloudData);
            save(key, userId, cloudData);
          }
        }
      } catch(e) { console.error('Cloud load failed:', e); }
      setSyncing(false);
    };
    
    loadFromCloud();
    
    // Listen for sync completion
    const handler = () => {
      const fresh = load(key, userId, defaultValue);
      setData(fresh);
    };
    window.addEventListener('sync-complete', handler);
    return () => window.removeEventListener('sync-complete', handler);
  }, [userId, key]);

  return [data, setDataAndSync, syncing];

const Dashboard = ({purchases,sales,writeoffs,user}) => {
  const stockMap = useMemo(()=>{
    const m={};
    purchases.forEach(p=>{m[p.medicine]=(m[p.medicine]||0)+sNum(p.qty);});
    sales.forEach(s=>{m[s.medicine]=(m[s.medicine]||0)-sNum(s.qty);});
    writeoffs.forEach(w=>{m[w.medicine]=(m[w.medicine]||0)-sNum(w.qty);});
    return m;
  },[purchases,sales,writeoffs]);

  const totalStock=Object.values(stockMap).reduce((a,b)=>a+Math.max(0,b),0);
  const totPurch  =purchases.reduce((a,p)=>a+sNum(p.costPrice)*sNum(p.qty),0);
  const totRev    =sales.reduce((a,s)=>a+sNum(s.sellPrice)*sNum(s.qty),0);
  const totProfit =sales.reduce((a,s)=>a+(sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty),0);
  const totWoLoss =writeoffs.reduce((a,w)=>a+sNum(w.costPrice)*sNum(w.qty),0);
  const expiring  =purchases.filter(p=>{const d=dLeft(p.expiry);return d>=0&&d<=30;});
  const lowStock  =Object.entries(stockMap).filter(([,v])=>v>0&&v<10).map(([k])=>k);
  const recent    =[...sales].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  return (
    <div>
      <div className="page-header">
        <h2>Dashboard</h2>
        <p>Welcome back, {user?.name || 'User'}. Here's your shop overview.</p>
      </div>
      
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">Total Stock</div>
          <div className="stat-value" style={{color:'var(--accent)'}}>{totalStock}</div>
          <div className="stat-sub">units across all medicines</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Purchased (all time)</div>
          <div className="stat-value" style={{color:'var(--info)',fontSize:20}}>{fmt(totPurch)}</div>
          <div className="stat-sub">{purchases.length} batches</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Sales Revenue</div>
          <div className="stat-value" style={{color:'var(--purple)',fontSize:20}}>{fmt(totRev)}</div>
          <div className="stat-sub">{sales.length} transactions</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Net Profit</div>
          <div className="stat-value" style={{color:totProfit>=0?'#16a34a':'var(--danger)',fontSize:20}}>{fmt(totProfit)}</div>
          <div className="stat-sub">revenue minus cost</div>
        </div>
      </div>

      {totWoLoss>0&&<div className="alert ao"><Ic n="alert"/><span><b>Write-off loss: {fmt(totWoLoss)}</b> from {writeoffs.length} entries — tracked separately</span></div>}
      {expiring.length>0&&<div className="alert aw"><Ic n="alert"/><span><b>{expiring.length} batch(es)</b> expiring within 30 days</span></div>}
      {lowStock.length>0&&<div className="alert ad"><Ic n="alert"/><span><b>Low stock alert:</b> {lowStock.slice(0,5).join(', ')}{lowStock.length>5?'...':''}</span></div>}

      <div className="card">
        <div className="card-title"><Ic n="sales" s={16}/> Recent Sales</div>
        {recent.length===0?<div className="empty"><div className="icon">📊</div><p>No sales recorded yet</p></div>:(
          <div className="twrap"><table>
            <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Qty</th><th>Sell Price</th><th>Profit</th><th>Date</th></tr></thead>
            <tbody>{recent.map(s=>{
              const pr=(sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty);
              return(
                <tr key={s.id} className={s._syncPending?'sync-pending':''}>
                  <td style={{fontWeight:600}}>{s.medicine}</td>
                  <td><span className="badge bp">{s.unit||'—'}</span></td>
                  <td><span className="badge bb">{s.batchNo}</span></td>
                  <td>{s.qty}</td>
                  <td className="mono">{fmt(s.sellPrice)}</td>
                  <td className={pr>=0?'pp':'pn'}>{fmt(pr)}</td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{fD(s.date)}</td>
                </tr>
              );
            })}</tbody>
          </table></div>
        )}
      </div>
    </div>
  );
};

// STOCK PAGE
// ═══════════════════════════════════════════════════════════════
const StockPage = ({purchases,setPurchases,sales,writeoffs,setWriteoffs,userId}) => {
  const [search,setSearch]=useState('');
  const [editM,setEditM]=useState(null);
  const [woM,setWoM]=useState(null);
  const [ef,setEf]=useState({});
  const [wf,setWf]=useState({qty:'',reason:'expired',note:'',date:today()});

  const batchStock=useMemo(()=>purchases.map(p=>{
    const sold=sales.filter(s=>s.purchaseId===p.id).reduce((a,s)=>a+sNum(s.qty),0);
    const wo  =writeoffs.filter(w=>w.purchaseId===p.id).reduce((a,w)=>a+sNum(w.qty),0);
    return{...p,sold,writtenOff:wo,remaining:Math.max(0,sNum(p.qty)-sold-wo)};
  }),[purchases,sales,writeoffs]);

  const grouped=useMemo(()=>{
    const m={};
    batchStock.forEach(b=>{
      if(!m[b.medicine])m[b.medicine]={total:0,batches:[],unit:b.unit};
      m[b.medicine].total+=b.remaining;
      m[b.medicine].batches.push(b);
    });
    return m;
  },[batchStock]);

  const filtered=Object.entries(grouped).filter(([n])=>n.toLowerCase().includes(search.toLowerCase()));

  const getSt=b=>{
    const d=dLeft(b.expiry);
    if(d<0) return{l:'Expired',c:'br'};
    if(d<=30) return{l:`Exp. ${d}d`,c:'by'};
    if(b.remaining===0) return{l:'Out of Stock',c:'br'};
    if(b.remaining<10) return{l:'Low Stock',c:'by'};
    return{l:'In Stock',c:'bg'};
  };

  const openEdit=b=>{setEf({...b});setEditM(b.id);};
  const saveEdit=()=>{
    if(!ef.medicine||!ef.batchNo||!ef.costPrice||!ef.qty||!ef.expiry) return alert('Fill required fields.');
    const u=purchases.map(p=>p.id===ef.id?{...ef,costPrice:sNum(ef.costPrice),sellPrice:sNum(ef.sellPrice),qty:sNum(ef.qty)}:p);
    setPurchases(u);
    SyncEngine.pushLocalChange(userId, 'purchases', 'update', ef);
    setEditM(null);
  };
  const delBatch=id=>{
    if(!confirm('Delete this batch?'))return;
    const u=purchases.filter(p=>p.id!==id);
    setPurchases(u);
    SyncEngine.pushLocalChange(userId, 'purchases', 'delete', {id});
  };

  const openWo=b=>{setWoM(b);setWf({qty:'',reason:'expired',note:'',date:today()});};
  const saveWo=()=>{
    if(!wf.qty||sNum(wf.qty)<=0) return alert('Enter quantity.');
    if(sNum(wf.qty)>woM.remaining) return alert(`Only ${woM.remaining} available.`);
    const entry={id:uid(),purchaseId:woM.id,medicine:woM.medicine,batchNo:woM.batchNo,unit:woM.unit||'',costPrice:woM.costPrice,qty:sNum(wf.qty),reason:wf.reason,note:san(wf.note),date:wf.date};
    const u=[...writeoffs,entry];
    setWriteoffs(u);
    SyncEngine.pushLocalChange(userId, 'writeoffs', 'insert', entry);
    setWoM(null);
  };

  const eSet=(k,v)=>setEf(p=>({...p,[k]:v}));
  const wSet=(k,v)=>setWf(p=>({...p,[k]:v}));

  return (
    <div>
      <div className="page-header"><h2>Stock / Inventory</h2><p>Batch-wise stock management</p></div>
      <div className="toolbar">
        <div className="sbox"><Ic n="search"/><input placeholder="Search medicine..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      </div>
      <div className="card">
        <div className="twrap">
          {filtered.length===0?<div className="empty"><div className="icon">📦</div><p>No stock data. Add purchases first.</p></div>:(
            <table>
              <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Remaining</th><th>Cost</th><th>Sell</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.flatMap(([name,data])=>
                  data.batches.map((b,i)=>{
                    const st=getSt(b);
                    return(
                      <tr key={b.id}>
                        {i===0&&<td style={{fontWeight:700,verticalAlign:'top',paddingTop:14}} rowSpan={data.batches.length}>{name}</td>}
                        {i===0&&<td style={{verticalAlign:'top',paddingTop:14}} rowSpan={data.batches.length}><span className="badge bp">{data.unit||'—'}</span></td>}
                        <td><span className="badge bb">{b.batchNo}</span></td>
                        <td><b>{b.remaining}</b><span style={{color:'var(--text3)',fontSize:11}}> /{b.qty}</span></td>
                        <td className="mono" style={{fontSize:12}}>{fmt(b.costPrice)}</td>
                        <td className="mono" style={{fontSize:12}}>{fmt(b.sellPrice)}</td>
                        <td style={{color:dLeft(b.expiry)<0?'var(--danger)':dLeft(b.expiry)<=30?'var(--warning)':'inherit',fontSize:12,fontWeight:500}}>{fD(b.expiry)}</td>
                        <td><span className={`badge ${st.c}`}>{st.l}</span></td>
                        <td>
                          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                            <button className="bti" onClick={()=>openEdit(b)}><Ic n="edit"/> Edit</button>
                            <button className="bti wo" onClick={()=>openWo(b)}><Ic n="writeoff"/> Write-off</button>
                            <button className="bti del" onClick={()=>delBatch(b.id)}><Ic n="trash"/></button>
                          </div>
                        </td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {editM&&<Modal title="Edit Batch" onClose={()=>setEditM(null)} footer={<><button className="btn btn-secondary" onClick={()=>setEditM(null)}>Cancel</button><button className="btn btn-primary" onClick={saveEdit}>Save Changes</button></>}>
        <div className="mform"><div className="g2">
          <div className="fg"><label>Medicine *</label><input value={ef.medicine||''} onChange={e=>eSet('medicine',e.target.value)}/></div>
          <div className="fg"><label>Unit Type</label><select value={ef.unit||''} onChange={e=>eSet('unit',e.target.value)}><option value="">— Select —</option>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
          <div className="fg"><label>Batch No *</label><input value={ef.batchNo||''} onChange={e=>eSet('batchNo',e.target.value)}/></div>
          <div className="fg"><label>Supplier</label><input value={ef.supplier||''} onChange={e=>eSet('supplier',e.target.value)}/></div>
          <div className="fg"><label>Cost Price ₹ *</label><input type="number" value={ef.costPrice||''} onChange={e=>eSet('costPrice',e.target.value)}/></div>
          <div className="fg"><label>Sell Price ₹ *</label><input type="number" value={ef.sellPrice||''} onChange={e=>eSet('sellPrice',e.target.value)}/></div>
          <div className="fg"><label>Total Qty *</label><input type="number" value={ef.qty||''} onChange={e=>eSet('qty',e.target.value)}/></div>
          <div className="fg"><label>Expiry Date *</label><input type="date" value={ef.expiry||''} onChange={e=>eSet('expiry',e.target.value)}/></div>
        </div></div>
      </Modal>}

      {woM&&<Modal title={`Write-off — ${woM.medicine}`} onClose={()=>setWoM(null)} footer={<><button className="btn btn-secondary" onClick={()=>setWoM(null)}>Cancel</button><button className="btn btn-orange" onClick={saveWo}><Ic n="writeoff"/> Confirm</button></>}>
        <div className="mform">
          <div className="warnpill"><Ic n="alert" s={14}/>Available: <b>{woM.remaining} {woM.unit||'units'}</b> · Cost: <b>{fmt(woM.costPrice)}</b>/unit</div>
          <div className="g2">
            <div className="fg"><label>Qty to Write-off *</label><input type="number" value={wf.qty} onChange={e=>wSet('qty',e.target.value)} placeholder={`Max ${woM.remaining}`}/></div>
            <div className="fg"><label>Reason</label><select value={wf.reason} onChange={e=>wSet('reason',e.target.value)}>
              <option value="expired">Expired</option><option value="misplaced">Misplaced / Lost</option>
              <option value="damaged">Damaged</option><option value="returned">Returned to Supplier</option>
              <option value="stolen">Stolen</option><option value="other">Other</option>
            </select></div>
            <div className="fg"><label>Date</label><input type="date" value={wf.date} onChange={e=>wSet('date',e.target.value)}/></div>
            <div className="fg"><label>Note</label><input value={wf.note} onChange={e=>wSet('note',e.target.value)} placeholder="What happened?"/></div>
          </div>
          {wf.qty&&sNum(wf.qty)>0&&<div className="warnpill"><Ic n="alert" s={14}/>Loss: <b>{fmt(woM.costPrice*sNum(wf.qty))}</b></div>}
        </div>
      </Modal>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// PURCHASE PAGE
// ═══════════════════════════════════════════════════════════════
const PurchasePage = ({purchases,setPurchases,userId}) => {
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const blank={medicine:'',unit:'',batchNo:'',costPrice:'',sellPrice:'',qty:'',expiry:'',date:today(),supplier:''};
  const [form,setForm]=useState(blank);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const openAdd=()=>{setEditing(null);setForm(blank);setModal(true);};
  const openEdit=p=>{setEditing(p.id);setForm({...p});setModal(true);};
  const close=()=>{setModal(false);setEditing(null);};

  const handleSave = async () => {
  if(!form.medicine||!form.batchNo||!form.costPrice||!form.sellPrice||!form.qty||!form.expiry) 
    return alert('Fill all * fields.');
    
  const e = {
    ...form,
    id: editing || uid(),
    medicine: san(form.medicine),
    batch_no: san(form.batchNo),  // Note: supabase uses batch_no not batchNo
    supplier: san(form.supplier),
    cost_price: sNum(form.costPrice),
    sell_price: sNum(form.sellPrice),
    qty: sNum(form.qty),
    user_id: userId
  };
  
  const u = editing 
    ? purchases.map(p => p.id === editing ? {...e, id: editing} : p)
    : [...purchases, e];
    
  setPurchases(u);
  
  // Sync to Supabase
  await SyncEngine.pushLocalChange(userId, 'purchases', editing ? 'update' : 'insert', e);
  
  close();
};
  
  const del=id=>{
    if(!confirm('Delete this purchase?'))return;
    const u=purchases.filter(p=>p.id!==id);
    setPurchases(u);
    SyncEngine.pushLocalChange(userId, 'purchases', 'delete', {id});
  };

  const filtered=[...purchases].filter(p=>p.medicine.toLowerCase().includes(search.toLowerCase())||(p.batchNo||'').toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));

  return (
    <div>
      <div className="page-header"><h2>Purchase Records</h2><p>Track all medicine purchases</p></div>
      
      <div className="toolbar">
        <div className="sbox"><Ic n="search"/><input placeholder="Search medicine or batch..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn btn-primary" onClick={openAdd}><Ic n="plus"/> Add Purchase</button>
      </div>
      
      <div className="card">
        <div className="twrap">
          {filtered.length===0?<div className="empty"><div className="icon">🛒</div><p>No purchases yet</p></div>:(
            <table>
              <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Cost</th><th>Sell Price</th><th>Qty</th><th>Expiry</th><th>Date</th><th>Supplier</th><th></th></tr></thead>
              <tbody>{filtered.map(p=>{const dl=dLeft(p.expiry);return(
                <tr key={p.id}>
                  <td style={{fontWeight:600}}>{p.medicine}</td>
                  <td><span className="badge bp">{p.unit||'—'}</span></td>
                  <td><span className="badge bb">{p.batchNo}</span></td>
                  <td className="mono" style={{fontSize:12}}>{fmt(p.costPrice)}</td>
                  <td className="mono" style={{fontSize:12}}>{fmt(p.sellPrice)}</td>
                  <td>{p.qty}</td>
                  <td style={{color:dl<0?'var(--danger)':dl<=30?'var(--warning)':'inherit',fontSize:12,fontWeight:500}}>{fD(p.expiry)}{dl>=0&&dl<=30?` (${dl}d)`:''}</td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{fD(p.date)}</td>
                  <td style={{color:'var(--text2)',fontSize:12}}>{p.supplier||'—'}</td>
                  <td><div style={{display:'flex',gap:5}}>
                    <button className="bti" onClick={()=>openEdit(p)}><Ic n="edit"/></button>
                    <button className="bti del" onClick={()=>del(p.id)}><Ic n="trash"/></button>
                  </div></td>
                </tr>
              );})}</tbody>
            </table>
          )}
        </div>
      </div>

      {modal&&<Modal title={editing?'Edit Purchase':'Add Purchase'} onClose={close} footer={<><button className="btn btn-secondary" onClick={close}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save</button></>}>
        <div className="mform"><div className="g2">
          <div className="fg"><label>Medicine Name *</label><input value={form.medicine} onChange={e=>f('medicine',e.target.value)} placeholder="e.g. Paracetamol 500mg"/></div>
          <div className="fg"><label>Unit Type</label><select value={form.unit} onChange={e=>f('unit',e.target.value)}><option value="">— Select unit —</option>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
          <div className="fg"><label>Batch No *</label><input value={form.batchNo} onChange={e=>f('batchNo',e.target.value)} placeholder="e.g. B001"/></div>
          <div className="fg"><label>Supplier</label><input value={form.supplier} onChange={e=>f('supplier',e.target.value)} placeholder="Optional"/></div>
          <div className="fg"><label>Cost Price ₹ *</label><input type="number" value={form.costPrice} onChange={e=>f('costPrice',e.target.value)} placeholder="80"/></div>
          <div className="fg"><label>Sell Price ₹ *</label><input type="number" value={form.sellPrice} onChange={e=>f('sellPrice',e.target.value)} placeholder="105"/></div>
          <div className="fg"><label>Quantity *</label><input type="number" value={form.qty} onChange={e=>f('qty',e.target.value)} placeholder="100"/></div>
          <div className="fg"><label>Expiry Date *</label><input type="date" value={form.expiry} onChange={e=>f('expiry',e.target.value)}/></div>
          <div className="fg" style={{gridColumn:'span 2'}}><label>Purchase Date</label><input type="date" value={form.date} onChange={e=>f('date',e.target.value)}/></div>
        </div></div>
      </Modal>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// SALES PAGE
// ═══════════════════════════════════════════════════════════════
const SalesPage = ({purchases,sales,setSales,writeoffs,userId}) => {
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const blank={medicine:'',purchaseId:'',batchNo:'',costPrice:'',sellPrice:'',unit:'',qty:'',date:today()};
  const [form,setForm]=useState(blank);
  const [batches,setBatches]=useState([]);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const getRemaining=useCallback((pid,excl=null)=>{
    const p=purchases.find(x=>x.id===pid);if(!p)return 0;
    const sold=sales.filter(s=>s.purchaseId===pid&&s.id!==excl).reduce((a,s)=>a+sNum(s.qty),0);
    const wo  =writeoffs.filter(w=>w.purchaseId===pid).reduce((a,w)=>a+sNum(w.qty),0);
    return Math.max(0,sNum(p.qty)-sold-wo);
  },[purchases,sales,writeoffs]);

  const openAdd=()=>{setEditing(null);setForm(blank);setBatches([]);setModal(true);};
  const openEdit=s=>{
    setEditing(s.id);setForm({...s});
    const bs=purchases.filter(p=>p.medicine===s.medicine&&(getRemaining(p.id,s.id)>0||p.id===s.purchaseId));
    setBatches(bs);setModal(true);
  };
  const close=()=>{setModal(false);setEditing(null);};

  const handleMed=med=>{
    const bs=purchases.filter(p=>p.medicine===med&&getRemaining(p.id)>0);
    setBatches(bs);setForm(p=>({...p,medicine:med,purchaseId:'',batchNo:'',costPrice:'',sellPrice:'',unit:''}));
  };
  const handleBatch=pid=>{
    const p=purchases.find(x=>x.id===pid);
    if(p)setForm(prev=>({...prev,purchaseId:pid,batchNo:p.batchNo,costPrice:p.costPrice,sellPrice:p.sellPrice,unit:p.unit||''}));
  };

  const handleSave=()=>{
    if(!form.medicine||!form.purchaseId||!form.qty||!form.sellPrice) return alert('Fill all required fields.');
    const rem=getRemaining(form.purchaseId,editing);
    if(sNum(form.qty)>rem) return alert(`Only ${rem} units available.`);
    const e={...form,medicine:san(form.medicine),qty:sNum(form.qty),sellPrice:sNum(form.sellPrice),costPrice:sNum(form.costPrice)};
    const u=editing?sales.map(s=>s.id===editing?{...e,id:editing}:s):[...sales,{...e,id:uid()}];
    setSales(u);
    
    if(editing) {
      SyncEngine.pushLocalChange(userId, 'sales', 'update', e);
    } else {
      SyncEngine.pushLocalChange(userId, 'sales', 'insert', {...e,id:uid()});
    }
    close();
  };
  
  const del=id=>{
    if(!confirm('Delete this sale?'))return;
    const u=sales.filter(s=>s.id!==id);
    setSales(u);
    SyncEngine.pushLocalChange(userId, 'sales', 'delete', {id});
  };

  const meds=[...new Set(purchases.map(p=>p.medicine))].sort();
  const filtered=[...sales].filter(s=>s.medicine.toLowerCase().includes(search.toLowerCase())||(s.batchNo||'').toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));

  return (
    <div>
      <div className="page-header"><h2>Sales Records</h2><p>Track all sales with auto profit calculation</p></div>
      <div className="toolbar">
        <div className="sbox"><Ic n="search"/><input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn btn-primary" onClick={openAdd}><Ic n="plus"/> Add Sale</button>
      </div>
      <div className="card"><div className="twrap">
        {filtered.length===0?<div className="empty"><div className="icon">💰</div><p>No sales yet</p></div>:(
          <table>
            <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Cost</th><th>Sell</th><th>Qty</th><th>Profit</th><th>Date</th><th></th></tr></thead>
            <tbody>{filtered.map(s=>{const pr=(sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty);return(
              <tr key={s.id}>
                <td style={{fontWeight:600}}>{s.medicine}</td>
                <td><span className="badge bp">{s.unit||'—'}</span></td>
                <td><span className="badge bb">{s.batchNo}</span></td>
                <td className="mono" style={{fontSize:12}}>{fmt(s.costPrice)}</td>
                <td className="mono" style={{fontSize:12}}>{fmt(s.sellPrice)}</td>
                <td>{s.qty}</td>
                <td className={pr>=0?'pp':'pn'}>{fmt(pr)}</td>
                <td style={{color:'var(--text3)',fontSize:12}}>{fD(s.date)}</td>
                <td><div style={{display:'flex',gap:5}}>
                  <button className="bti" onClick={()=>openEdit(s)}><Ic n="edit"/></button>
                  <button className="bti del" onClick={()=>del(s.id)}><Ic n="trash"/></button>
                </div></td>
              </tr>
            );})}</tbody>
          </table>
        )}</div></div>

      {modal&&<Modal title={editing?'Edit Sale':'Add Sale'} onClose={close} footer={<><button className="btn btn-secondary" onClick={close}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save</button></>}>
        <div className="mform">
          <div className="fg"><label>Medicine *</label>
            <select value={form.medicine} onChange={e=>handleMed(e.target.value)}>
              <option value="">Select medicine</option>
              {meds.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          {batches.length>0&&<div className="fg"><label>Batch *</label>
            <select value={form.purchaseId} onChange={e=>handleBatch(e.target.value)}>
              <option value="">Select batch</option>
              {batches.map(b=><option key={b.id} value={b.id}>{b.batchNo} · {b.unit||''} · Cost:{fmt(b.costPrice)} · Avail:{getRemaining(b.id,editing)} · Exp:{fD(b.expiry)}</option>)}
            </select>
          </div>}
          {form.purchaseId&&<div className="infopill"><Ic n="stock" s={14}/>Batch <b>{form.batchNo}</b> · Available: <b>{getRemaining(form.purchaseId,editing)}</b> · Cost: <b>{fmt(form.costPrice)}</b></div>}
          <div className="g2">
            <div className="fg"><label>Sell Price ₹ *</label><input type="number" value={form.sellPrice} onChange={e=>f('sellPrice',e.target.value)}/></div>
            <div className="fg"><label>Quantity *</label><input type="number" value={form.qty} onChange={e=>f('qty',e.target.value)} placeholder={form.purchaseId?`Max ${getRemaining(form.purchaseId,editing)}`:'Qty'}/></div>
          </div>
          {form.qty&&form.sellPrice&&form.costPrice&&<div className="calcpill">Profit: ({fmt(form.sellPrice)} − {fmt(form.costPrice)}) × {form.qty} = <b>{fmt((sNum(form.sellPrice)-sNum(form.costPrice))*sNum(form.qty))}</b></div>}
          <div className="fg"><label>Sale Date</label><input type="date" value={form.date} onChange={e=>f('date',e.target.value)}/></div>
        </div>
      </Modal>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// WRITE-OFF PAGE
// ═══════════════════════════════════════════════════════════════
const WriteoffPage = ({writeoffs,setWriteoffs,userId}) => {
  const [search,setSearch]=useState('');
  const [editM,setEditM]=useState(null);
  const [ef,setEf]=useState({});

  const del=id=>{
    if(!confirm('Delete this write-off?'))return;
    const u=writeoffs.filter(w=>w.id!==id);
    setWriteoffs(u);
    SyncEngine.pushLocalChange(userId, 'writeoffs', 'delete', {id});
  };
  
  const openEdit=w=>{setEf({...w});setEditM(w.id);};
  const saveEdit=()=>{
    const u=writeoffs.map(w=>w.id===editM?{...ef,qty:sNum(ef.qty)}:w);
    setWriteoffs(u);
    SyncEngine.pushLocalChange(userId, 'writeoffs', 'update', ef);
    setEditM(null);
  };
  const eSet=(k,v)=>setEf(p=>({...p,[k]:v}));

  const filtered=[...writeoffs].filter(w=>w.medicine.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalLoss=filtered.reduce((a,w)=>a+sNum(w.costPrice)*sNum(w.qty),0);

  const RLABELS={expired:'Expired',misplaced:'Misplaced/Lost',damaged:'Damaged',returned:'Returned',stolen:'Stolen',other:'Other'};

  const printPDF=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text('MediStock — Write-off Report',14,20);
    doc.setFontSize(11);doc.setFont('helvetica','normal');
    doc.text(`Total loss: ${fmt(totalLoss)}   Entries: ${filtered.length}`,14,30);
    doc.autoTable({startY:38,head:[['Medicine','Unit','Batch','Qty','Cost/Unit','Loss','Reason','Note','Date']],
      body:filtered.map(w=>[w.medicine,w.unit||'—',w.batchNo,w.qty,fmt(w.costPrice),fmt(sNum(w.costPrice)*sNum(w.qty)),RLABELS[w.reason]||w.reason,w.note||'—',fD(w.date)]),
      styles:{fontSize:9},headStyles:{fillColor:[234,88,12]}});
    doc.save('medistock-writeoffs.pdf');
  };

  return (
    <div>
      <div className="page-header"><h2>Write-offs</h2><p>Expired, damaged or lost medicines</p></div>
      <div style={{background:'var(--orange-light)',border:'2px solid #fed7aa',borderRadius:14,padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div className="stat-label">Total Write-off Loss</div>
          <div style={{fontSize:28,fontWeight:700,color:'var(--orange)',marginTop:4}}>{fmt(totalLoss)}</div>
          <div className="stat-sub">{writeoffs.length} entries · separate from profit</div>
        </div>
        <button className="btn btn-secondary" onClick={printPDF}><Ic n="pdf"/> Download PDF</button>
      </div>
      <div className="toolbar">
        <div className="sbox"><Ic n="search"/><input placeholder="Search medicine..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      </div>
      <div className="card"><div className="twrap">
        {filtered.length===0?<div className="empty"><div className="icon">🗑️</div><p>No write-offs yet. Use Stock page to write off.</p></div>:(
          <table>
            <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Qty</th><th>Cost/Unit</th><th>Total Loss</th><th>Reason</th><th>Note</th><th>Date</th><th></th></tr></thead>
            <tbody>{filtered.map(w=>(
              <tr key={w.id}>
                <td style={{fontWeight:600}}>{w.medicine}</td>
                <td><span className="badge bp">{w.unit||'—'}</span></td>
                <td><span className="badge bb">{w.batchNo}</span></td>
                <td>{w.qty}</td>
                <td className="mono" style={{fontSize:12}}>{fmt(w.costPrice)}</td>
                <td className="pn">{fmt(sNum(w.costPrice)*sNum(w.qty))}</td>
                <td><span className="badge bo">{RLABELS[w.reason]||w.reason}</span></td>
                <td><div className="notecell" title={w.note}>{w.note||'—'}</div></td>
                <td style={{color:'var(--text3)',fontSize:12}}>{fD(w.date)}</td>
                <td><div style={{display:'flex',gap:5}}>
                  <button className="bti" onClick={()=>openEdit(w)}><Ic n="edit"/></button>
                  <button className="bti del" onClick={()=>del(w.id)}><Ic n="trash"/></button>
                </div></td>
              </tr>
            ))}</tbody>
          </table>
        )}</div></div>

      {editM&&<Modal title="Edit Write-off" onClose={()=>setEditM(null)} footer={<><button className="btn btn-secondary" onClick={()=>setEditM(null)}>Cancel</button><button className="btn btn-primary" onClick={saveEdit}>Save</button></>}>
        <div className="mform"><div className="g2">
          <div className="fg"><label>Quantity</label><input type="number" value={ef.qty||''} onChange={e=>eSet('qty',e.target.value)}/></div>
          <div className="fg"><label>Reason</label><select value={ef.reason||''} onChange={e=>eSet('reason',e.target.value)}>
            <option value="expired">Expired</option><option value="misplaced">Misplaced / Lost</option>
            <option value="damaged">Damaged</option><option value="returned">Returned to Supplier</option>
            <option value="stolen">Stolen</option><option value="other">Other</option>
          </select></div>
          <div className="fg"><label>Date</label><input type="date" value={ef.date||''} onChange={e=>eSet('date',e.target.value)}/></div>
          <div className="fg"><label>Note</label><input value={ef.note||''} onChange={e=>eSet('note',e.target.value)}/></div>
        </div></div>
      </Modal>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// REPORTS PAGE
// ═══════════════════════════════════════════════════════════════
const ReportPage = ({purchases,sales,writeoffs}) => {
  const now=new Date();
  const [month,setMonth]=useState(String(now.getMonth()+1).padStart(2,'0'));
  const [year,setYear]=useState(String(now.getFullYear()));

  const fS=sales.filter(s=>{const d=new Date(s.date);return String(d.getMonth()+1).padStart(2,'0')===month&&String(d.getFullYear())===year;});
  const fP=purchases.filter(p=>{const d=new Date(p.date);return String(d.getMonth()+1).padStart(2,'0')===month&&String(d.getFullYear())===year;});
  const fW=writeoffs.filter(w=>{const d=new Date(w.date);return String(d.getMonth()+1).padStart(2,'0')===month&&String(d.getFullYear())===year;});

  const tRev =fS.reduce((a,s)=>a+sNum(s.sellPrice)*sNum(s.qty),0);
  const tCOGS=fS.reduce((a,s)=>a+sNum(s.costPrice)*sNum(s.qty),0);
  const tProf=tRev-tCOGS;
  const tPurch=fP.reduce((a,p)=>a+sNum(p.costPrice)*sNum(p.qty),0);
  const tWo  =fW.reduce((a,w)=>a+sNum(w.costPrice)*sNum(w.qty),0);
  const mn   =MN[parseInt(month)-1];

  const pdfSales=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text('MediStock — Sales Report',14,20);
    doc.setFontSize(10);doc.text(`Period: ${mn} ${year}   Revenue: ${fmt(tRev)}   Profit: ${fmt(tProf)}`,14,30);
    doc.autoTable({startY:38,head:[['Medicine','Unit','Batch','Cost','Sell','Qty','Profit','Date']],
      body:fS.map(s=>[s.medicine,s.unit||'—',s.batchNo,fmt(s.costPrice),fmt(s.sellPrice),s.qty,fmt((sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty)),fD(s.date)]),
      styles:{fontSize:9},headStyles:{fillColor:[26,107,74]}});
    doc.save(`sales-${year}-${month}.pdf`);
  };
  
  const pdfPurch=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.text('MediStock — Purchase Report',14,20);
    doc.setFontSize(10);doc.text(`Period: ${mn} ${year}   Total: ${fmt(tPurch)}`,14,30);
    doc.autoTable({startY:38,head:[['Medicine','Unit','Batch','Cost','Sell','Qty','Expiry','Date','Supplier']],
      body:fP.map(p=>[p.medicine,p.unit||'—',p.batchNo,fmt(p.costPrice),fmt(p.sellPrice),p.qty,fD(p.expiry),fD(p.date),p.supplier||'—']),
      styles:{fontSize:9},headStyles:{fillColor:[26,107,74]}});
    doc.save(`purchases-${year}-${month}.pdf`);
  };
  
  const pdfWo=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.text('MediStock — Write-off Report',14,20);
    doc.setFontSize(10);doc.text(`Period: ${mn} ${year}   Loss: ${fmt(tWo)}`,14,30);
    doc.autoTable({startY:38,head:[['Medicine','Unit','Batch','Qty','Loss','Reason','Note','Date']],
      body:fW.map(w=>[w.medicine,w.unit||'—',w.batchNo,w.qty,fmt(sNum(w.costPrice)*sNum(w.qty)),w.reason,w.note||'—',fD(w.date)]),
      styles:{fontSize:9},headStyles:{fillColor:[234,88,12]}});
    doc.save(`writeoffs-${year}-${month}.pdf`);
  };
  
  const pdfMonthly=()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.text('MediStock — Monthly Summary',14,20);
    doc.setFontSize(11);doc.text(`${mn} ${year}`,14,30);
    doc.autoTable({startY:38,head:[['Metric','Value']],
      body:[
        ['Purchases (entries)',fP.length],['Amount Purchased',fmt(tPurch)],
        ['Sales (entries)',fS.length],['Sales Revenue',fmt(tRev)],
        ['Cost of Goods Sold',fmt(tCOGS)],['Net Profit',fmt(tProf)],
        ['Write-off (entries)',fW.length],['Write-off Loss',fmt(tWo)],
        ['Effective Profit (after write-off)',fmt(tProf-tWo)],
      ],
      styles:{fontSize:10},headStyles:{fillColor:[26,107,74]}});
    if(fS.length>0) doc.autoTable({startY:doc.lastAutoTable.finalY+10,head:[['Medicine','Unit','Batch','Qty','Revenue','Profit']],
      body:fS.map(s=>[s.medicine,s.unit||'—',s.batchNo,s.qty,fmt(sNum(s.sellPrice)*sNum(s.qty)),fmt((sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty))]),
      styles:{fontSize:9},headStyles:{fillColor:[59,130,246]}});
    doc.save(`summary-${year}-${month}.pdf`);
  };

  return (
    <div>
      <div className="page-header"><h2>Reports</h2><p>Monthly summary with PDF export</p></div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20,flexWrap:'wrap'}}>
        <select className="flt" value={month} onChange={e=>setMonth(e.target.value)}>
          {MN.map((m,i)=><option key={m} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <select className="flt" value={year} onChange={e=>setYear(e.target.value)}>
          {years().map(y=><option key={y}>{y}</option>)}
        </select>
        <div style={{width:1,height:32,background:'var(--border)',margin:'0 4px'}}/>
        <button className="btn btn-secondary btn-sm" style={{height:40}} onClick={pdfSales}><Ic n="pdf"/> Sales</button>
        <button className="btn btn-secondary btn-sm" style={{height:40}} onClick={pdfPurch}><Ic n="pdf"/> Purchase</button>
        <button className="btn btn-orange btn-sm" style={{height:40}} onClick={pdfWo}><Ic n="pdf"/> Write-off</button>
        <button className="btn btn-primary btn-sm" style={{height:40}} onClick={pdfMonthly}><Ic n="pdf"/> Summary</button>
      </div>

      <div className="stat-grid">
        <div className="stat-card"><div className="stat-label">Purchased</div><div className="stat-value" style={{color:'var(--info)',fontSize:20}}>{fmt(tPurch)}</div><div className="stat-sub">{fP.length} entries</div></div>
        <div className="stat-card"><div className="stat-label">Sales Revenue</div><div className="stat-value" style={{color:'var(--purple)',fontSize:20}}>{fmt(tRev)}</div><div className="stat-sub">{fS.length} entries</div></div>
        <div className="stat-card"><div className="stat-label">Net Profit</div><div className="stat-value" style={{color:tProf>=0?'#16a34a':'var(--danger)',fontSize:20}}>{fmt(tProf)}</div><div className="stat-sub">revenue − cost</div></div>
        <div className="stat-card"><div className="stat-label">Write-off Loss</div><div className="stat-value" style={{color:'var(--orange)',fontSize:20}}>{fmt(tWo)}</div><div className="stat-sub">{fW.length} entries</div></div>
      </div>
      {tWo>0&&<div className="alert ao"><Ic n="alert"/><span>Effective profit after write-offs: <b>{fmt(tProf-tWo)}</b></span></div>}

      <div className="card"><div className="card-title"><Ic n="sales" s={16}/> Sales — {mn} {year}</div>
        {fS.length===0?<div className="empty"><p>No sales this period</p></div>:(
          <div className="twrap"><table>
            <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Cost</th><th>Sell</th><th>Qty</th><th>Profit</th><th>Date</th></tr></thead>
            <tbody>{fS.map(s=>{const pr=(sNum(s.sellPrice)-sNum(s.costPrice))*sNum(s.qty);return(
              <tr key={s.id}><td style={{fontWeight:600}}>{s.medicine}</td><td><span className="badge bp">{s.unit||'—'}</span></td><td><span className="badge bb">{s.batchNo}</span></td><td className="mono" style={{fontSize:12}}>{fmt(s.costPrice)}</td><td className="mono" style={{fontSize:12}}>{fmt(s.sellPrice)}</td><td>{s.qty}</td><td className={pr>=0?'pp':'pn'}>{fmt(pr)}</td><td style={{color:'var(--text3)',fontSize:12}}>{fD(s.date)}</td></tr>
            );})}</tbody>
          </table></div>
        )}</div>

      <div className="card"><div className="card-title"><Ic n="purchase" s={16}/> Purchases — {mn} {year}</div>
        {fP.length===0?<div className="empty"><p>No purchases this period</p></div>:(
          <div className="twrap"><table>
            <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Cost</th><th>Sell</th><th>Qty</th><th>Expiry</th><th>Date</th></tr></thead>
            <tbody>{fP.map(p=>(
              <tr key={p.id}><td style={{fontWeight:600}}>{p.medicine}</td><td><span className="badge bp">{p.unit||'—'}</span></td><td><span className="badge bb">{p.batchNo}</span></td><td className="mono" style={{fontSize:12}}>{fmt(p.costPrice)}</td><td className="mono" style={{fontSize:12}}>{fmt(p.sellPrice)}</td><td>{p.qty}</td><td style={{fontSize:12}}>{fD(p.expiry)}</td><td style={{color:'var(--text3)',fontSize:12}}>{fD(p.date)}</td></tr>
            ))}</tbody>
          </table></div>
        )}</div>

      {fW.length>0&&<div className="card"><div className="card-title" style={{color:'var(--orange)'}}><Ic n="writeoff" s={16}/> Write-offs — {mn} {year}</div>
        <div className="twrap"><table>
          <thead><tr><th>Medicine</th><th>Unit</th><th>Batch</th><th>Qty</th><th>Loss</th><th>Reason</th><th>Note</th><th>Date</th></tr></thead>
          <tbody>{fW.map(w=>(
            <tr key={w.id}><td style={{fontWeight:600}}>{w.medicine}</td><td><span className="badge bp">{w.unit||'—'}</span></td><td><span className="badge bb">{w.batchNo}</span></td><td>{w.qty}</td><td className="pn">{fmt(sNum(w.costPrice)*sNum(w.qty))}</td><td><span className="badge bo">{w.reason}</span></td><td style={{fontSize:12,color:'var(--text2)'}}>{w.note||'—'}</td><td style={{color:'var(--text3)',fontSize:12}}>{fD(w.date)}</td></tr>
          ))}</tbody>
        </table></div>
      </div>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [loggedIn,setLoggedIn]=useState(()=>{
    const sess=load('current_user','system',null);
    return sess && (Date.now()-sess.ts)<12*60*60*1000;
  });
  const [currentUser,setCurrentUser]=useState(()=>load('current_user','system',null));
  const [page,setPage]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [syncPending,setSyncPending]=useState(false);

  const userId = currentUser?.id || 'default';
  
  const [purchases, setPurchases] = useUserData(userId, 'purchases', []);
  const [sales, setSales] = useUserData(userId, 'sales', []);
  const [writeoffs, setWriteoffs] = useUserData(userId, 'writeoffs', []);

  // Check sync status
  useEffect(() => {
    const checkSync = () => {
      const queue = SyncQueue.getQueue(userId);
      setSyncPending(queue.length > 0);
    };
    checkSync();
    const interval = setInterval(checkSync, 5000);
    window.addEventListener('sync-complete', checkSync);
    return () => {
      clearInterval(interval);
      window.removeEventListener('sync-complete', checkSync);
    };
  }, [userId]);

  // Initialize offline banner
  useEffect(() => {
    SyncEngine.updateOfflineBanner();
  }, []);

  const logout=()=>{
    save('current_user','system',null);
    save('sess_ts','system',0);
    setLoggedIn(false);
    setCurrentUser(null);
  };

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setLoggedIn(true);
    initSupabase();
  };

  const NAV=[
    {id:'dashboard',label:'Dashboard', icon:'dashboard'},
    {id:'stock',    label:'Stock',      icon:'stock'},
    {id:'purchase', label:'Purchases',  icon:'purchase'},
    {id:'sales',    label:'Sales',      icon:'sales'},
    {id:'writeoffs',label:'Write-offs', icon:'writeoff'},
    {id:'report',   label:'Reports',    icon:'report'},
  ];

  const pageTitle = NAV.find(n=>n.id===page)?.label || 'MediStock';

  if(!loggedIn) return <LoginPage onLogin={handleLogin}/>;

  return (
    <>
      {/* Mobile Header */}
      <MobileHeader title={pageTitle} onMenuClick={()=>setSidebarOpen(true)} user={currentUser}/>
      
      {/* Mobile Overlay */}
      <div className={`mobile-overlay${sidebarOpen?' show':''}`} onClick={()=>setSidebarOpen(false)}/>
      
      {/* Sidebar */}
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="sidebar-logo">
          <h1>💊 MediStock</h1>
          <p>Medical Shop Inventory</p>
        </div>
        <nav className="sidebar-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>{setPage(n.id);setSidebarOpen(false);}}>
              <Ic n={n.icon}/>
              {n.label}
              {n.id!=='dashboard' && syncPending && <span className="sync-badge show"/>}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="avatar">{currentUser?.name?.charAt(0)?.toUpperCase() || 'U'}</div>
            <div>
              <div style={{fontWeight:600,fontSize:12}}>{currentUser?.name || 'User'}</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{currentUser?.role === 'admin' ? 'Administrator' : 'Staff'}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:navigator.onLine?'#22c55e':'var(--warning)'}}/>
            <span style={{fontSize:11,color:'var(--text3)'}}>{navigator.onLine?'Online':'Offline'}</span>
            {syncPending && <span style={{fontSize:10,color:'var(--warning)',marginLeft:'auto'}}>⏳ Sync pending</span>}
          </div>
          <p>Data saved locally · Auto-sync enabled</p>
          <button className="logout-btn" onClick={logout}><Ic n="logout" s={14}/>Logout</button>
        </div>
      </div>
      
      {/* Main Content */}
      <div className="main">
        {page==='dashboard' &&<Dashboard purchases={purchases} sales={sales} writeoffs={writeoffs} user={currentUser}/>}
        {page==='stock'     &&<StockPage purchases={purchases} setPurchases={setPurchases} sales={sales} writeoffs={writeoffs} setWriteoffs={setWriteoffs} userId={userId}/>}
        {page==='purchase'  &&<PurchasePage purchases={purchases} setPurchases={setPurchases} userId={userId}/>}
        {page==='sales'     &&<SalesPage purchases={purchases} sales={sales} setSales={setSales} writeoffs={writeoffs} userId={userId}/>}
        {page==='writeoffs' &&<WriteoffPage writeoffs={writeoffs} setWriteoffs={setWriteoffs} userId={userId}/>}
        {page==='report'    &&<ReportPage purchases={purchases} sales={sales} writeoffs={writeoffs}/>}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
